<script>
$('.toggle-date').click(function(){
    if ($('#date').is(":visible")) {
        $('[id=date]').css('display','none');
        $('.toggle-date').html('show date: no');
    }
    else {
        $('[id=date]').css('display','block');
        $('.toggle-date').html('show date: yes');
    }
});
    
function sortDate(newestFirst) {
    var table, rows, x, y, switching;
    switching = true;
    table = document.getElementById('article-list');
    rows = table.rows;
    
    while (switching) {
        switching = false;
        for (i = 0; i < (rows.length - 1); i++) {
            x = rows[i].getElementsByTagName('td')[0].innerHTML;
            y = rows[i+1].getElementsByTagName('td')[0].innerHTML;
            if (newestFirst && x > y) {
                rows[0].parentNode.insertBefore(rows[i+1], rows[i]);
                switching = true;
            }
            if (!newestFirst && x < y) {
                rows[0].parentNode.insertBefore(rows[i+1], rows[i]);
                switching = true;
            }
        }
    }
}
    
var newestFirst = true;
$('.sort-date').click(function(){
    if (newestFirst) {
        $('.sort-date').html('oldest first');
        sortDate(newestFirst);
        newestFirst = false;
    }
    else {
        $('.sort-date').html('newest first');
        sortDate(newestFirst);
        newestFirst = true;
    }
});
</script>

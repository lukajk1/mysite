    <style>
        audio {

            max-width: 1085px;

        .piece-container img {

            padding: 0;
            margin: 0;
        }
        
        .piece-container {
            width: 350px;
            margin: 0;
            padding: 0;
        }
        .piece-description {
			position: absolute;
			max-width: 100%;
        }
        summary:hover {
            cursor: pointer;
        }
        details > summary {
          list-style: none;
        }
        details > summary::-webkit-details-marker {
          display: none;
        }
        audio {
            padding-bottom: 10px;
        }
        span {
            position:relative;
        }        
        .text-content {
            max-height: 250px;
            overflow-y: hidden;
            width: 320px;
            margin: 0;
            padding: 15px;
            border: 1px solid black;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
        }
        .text-content::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to bottom, transparent, white);
        }

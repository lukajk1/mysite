        .piece-container img {

        .piece-container {
			position: relative;
            display: inline-block;
            width: 350px;
            padding-bottom: 30px;
        }
        .piece-description {
			position: absolute;
			max-width: 100%;
        }
        summary:hover {
            cursor: pointer;
        }
        details > summary {
          list-style: none;
        }
        details > summary::-webkit-details-marker {
          display: none;
        }
        .piece-description a {text-decoration: revert;}

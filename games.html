<!doctype html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <title>lukajk</title>
    <link rel='stylesheet' href='css/style.css'>
	<link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <style>
        audio {   
            padding-top: 10px;
            filter: contrast(65%) invert(100%);
            height: 26px;
        }
        
        body {
            width: revert;
            padding-bottom: 70px;
        }
        #nav li {
            display: inline;
            padding-right: 7px;
        }
        .music-img {
            height: revert;
        }
        #main-content-body p {
            white-space: pre-line;
            margin:0;
        }
        
        #header {
            width: 600px;
            margin: auto;
            margin-bottom: 30px;
        }
        
        #main-content-body {
            gap: 15px;
            margin: auto;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            padding: 15px 30px;
            justify-content: center;
        }

        .piece-container img {
            width: 100%;
            padding: 0;
            margin: 0;
        }
        
        .piece-container {
			position: relative;
            display: inline-block;
            width: 350px;
            padding-bottom: 30px;
        }
        .piece-description {
			position: absolute;
			max-width: 100%;
        }
        summary:hover {
            cursor: pointer;
        }
        details > summary {
          list-style: none;
        }
        details > summary::-webkit-details-marker {
          display: none;
        }
/*
        #main-content-body {border: 1px solid red;}

    </style>
</head>

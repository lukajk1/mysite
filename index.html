<!doctype html>

    <link rel='stylesheet' href='css/style.css'>

</head>
<body>
    <div id='header'>
        <div id='nav-wrapper'>
            <h2 style='margin-bottom: 18px;'>
                <span>lukajk</span>
            </h2>
            <ul id='nav'>
                <li><a href='about.html'>about</a></li>|<li><a href='updates.html'>updates</a></li>
            </ul>
            <div id='checkboxes'>
                <input type="checkbox" id='art' onclick="toggleVisibility('art')" checked />
                <label for='art'>art&nbsp;&nbsp;</label>
                <input type="checkbox" id='music' onclick="toggleVisibility('music')" checked />
                <label for='music'>music&nbsp;&nbsp;</label>
                <input type="checkbox" id='games' onclick="toggleVisibility('games')" checked />
                <label for='games'>game</label>
            </div>
            <div id='radio'>
                <label>arrange:</label>
                <input type="radio" id="toggle1" name="toggle" value="main-content-body" onclick="toggleDivs()" checked>
                <label for="toggle1">default&nbsp;</label>
                <input type="radio" id="toggle2" name="toggle" value="main-content-body-date" onclick="toggleDivs()">

            </div>
        </div>
    </div>

    <div id='main-content-body' class="content">

            </div>

        </div>

            <div class='piece-container music'>

                </div>
            </div>
            <div class='piece-container games'>
                <div class='game-img'>
                    <img src='img/games/cowboy-sokoban.png' loading='lazy'>
                </div>
                <div class='piece-description'>
                    <center>
                        <p style='margin-bottom: 10px;'><a href='https://lukajk.itch.io/cowboy-sokoban'>cowboy sokoban - itch.io</a></p>
                    </center>
                </div>
            </div>
        </div>
        <div class='content-column'>
            <div class='piece-container art'>
                <img src='img/art/32.jpg' class='blog-img' loading='lazy'>
                <div class='piece-description'></div>
            </div>
            <div class='piece-container games'>
                <div class='game-img'>
                    <img src='img/games/shape-rotator.png' loading='lazy'>
                </div>
                <div class='piece-description'>
                    <center>
                        <p style='margin-bottom: 10px;'><a href='https://lukajk.itch.io/shape-rotator'>shape rotator - itch.io</a></p>
                    </center>
                </div>
            </div>
            <div class='piece-container music'>
                <img src='img/art/45.jpg' class='music-img' loading='lazy'>
                <div class='piece-description'>
                    <audio controls controlsList='noplaybackrate' preload="metadata">
                        <source src="https://dl.sndup.net/bvq5/5-2.mp3" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
            </div>
        </div>
    </div>

    <div id='main-content-body-date' class="content">
        <div class='content-column'>
            
            <div class='piece-container games'>
                <div class='game-img'>
                    <img src='img/games/cowboy-sokoban.png' loading='lazy'>
                </div>
                <div class='piece-description'>
                    <center>
                        <p style='margin-bottom: 10px;'><a href='https://lukajk.itch.io/cowboy-sokoban'>cowboy sokoban - itch.io</a></p>
                    </center>
                </div>
            </div>
            
            <div class='piece-container art'>
                <img src='img/art/32.jpg' class='blog-img' loading='lazy'>
                <div class='piece-description'></div>
            </div>
            
        </div>
        <div class='content-column'>
            
            <div class='piece-container games'>
                <div class='game-img'>
                    <img src='img/games/shape-rotator.png' loading='lazy'>
                </div>
                <div class='piece-description'>
                    <center>
                        <p style='margin-bottom: 10px;'><a href='https://lukajk.itch.io/shape-rotator'>shape rotator - itch.io</a></p>
                    </center>
                </div>
            </div>
            
            <div class='piece-container music'>
                <img src='img/art/45.jpg' class='music-img' loading='lazy'>

                    <audio controls controlsList='noplaybackrate' preload="metadata">

            </div>
            
        </div>

                <img src='img/music/end.png' class='music-img' loading='lazy'>
                <div class='piece-description'>

        </div>
    </div>

    <center><p style='margin-top:30px;'><a href='#top'>back to top</a></p></center>

    <script>
        document.getElementById('nav').style.display = '';

        function toggleVisibility(className) {
            var elements = document.getElementsByClassName(className);
            var checkbox = document.getElementById(className);

            for (var i = 0; i < elements.length; i++) {
                elements[i].style.display = checkbox.checked ? '' : 'none';
            }
        }

        function toggleDivs() {
            var div1 = document.getElementById('main-content-body');
            var div2 = document.getElementById('main-content-body-date');
            var selectedValue = document.querySelector('input[name="toggle"]:checked').value;

            if (selectedValue === 'main-content-body') {
                div1.style.display = 'flex';
                div2.style.display = 'none';
            } else {
                div1.style.display = 'none';
                div2.style.display = 'flex';
            }
        }

        // Initialize the correct div based on the default radio button selection
        window.onload = toggleDivs;

        // Set volume for all audio elements
        window.addEventListener('DOMContentLoaded', (event) => {
            const collection = document.getElementsByTagName('audio');
            for (let i = 0; i < collection.length; i++) {
                collection[i].volume = 0.4;
            }
        });
    </script>
</body>
</html>
